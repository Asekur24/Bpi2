<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Developer Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* QR Page Style Color Changing Background */
        body { 
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff0000, #8b00ff, #00ff00, #ff00ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        nav { width: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }

        /* Developer Image Section (Circular) */
        .dev-profile {
            margin-top: 50px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: #fff;
        }

        .dev-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            margin-top: 25px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .contact-card h2 { margin-bottom: 20px; font-weight: 800; color: #f9d423; text-transform: uppercase; }
        
        .info-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 12px; text-align: left; border-left: 5px solid #f9d423; font-size: 14px; }
        .info-box b { color: #f9d423; margin-right: 5px; }
        
        .social-buttons { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .social-buttons a { 
            text-decoration: none; 
            padding: 12px 25px; 
            border-radius: 30px; 
            font-weight: bold; 
            transition: 0.4s;
            color: white;
        }
        .fb-btn { background: #1877F2; }
        .wa-btn { background: #25D366; }
        .social-buttons a:hover { transform: translateY(-5px); filter: brightness(1.2); }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="qr.html">QR Tool</a>
    <a href="contact.html">Contact</a>
</nav>

</div>

</body>
</html>
