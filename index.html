<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Department Portal</title>
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        /* Fast & Vibrant Multi-color Background (QR Style) */
        body { 
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff0000, #8b00ff, #00ff00, #ff00ff, #00dbde, #fc00ff);
            background-size: 400% 400%;
            animation: gradientBG 8s ease-in-out infinite;
        }

        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        /* Nav Bar */
        nav { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* 3-Second Slider */
        .slider-container { width: 95%; max-width: 1100px; height: 250px; margin: 20px auto; overflow: hidden; border-radius: 20px; border: 3px solid rgba(255,255,255,0.4); position: relative; }
        .slides { display: flex; width: 500%; height: 100%; transition: 0.8s ease-in-out; }
        .slides img { width: 20%; height: 100%; object-fit: cover; }

        header { padding: 20px; text-align: center; color: white; }
        
        /* Updated Title Style: Balanced Size */
        .main-title { 
            font-size: 24px; /* Size balanced to look professional */
            font-weight: 800; 
            text-transform: uppercase; 
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 10px;
            color: #f9d423; /* Bright Yellow Highlight */
            border: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 5px;
        }

        /* Form */
        .form-container { max-width: 600px; margin: 0 auto 30px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); color: white; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #fff; color: #333; }
        .btn-add { background: #f9d423; color: #111; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-add:hover { background: #fff; transform: scale(1.02); }

        /* Student Grid */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .img-box { width: 90px; height: 90px; background: #eee; border-radius: 50%; margin: 0 auto 10px; overflow: hidden; border: 3px solid #8b00ff; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .dept-tag { background: #8b00ff; color: white; font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: bold; }
        .info { text-align: left; font-size: 13px; margin-top: 10px; color: #555; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="qr.html">QR Tool</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="slider-container">
    <div class="slides" id="homeSlider">
        <img src="images/1.jpg" alt="1">
        <img src="images/2.jpg" alt="2">
        <img src="images/3.jpg" alt="3">
        <img src="images/4.jpg" alt="4">
        <img src="images/5.jpg" alt="5">
    </div>
</div>

<header>
    <h1 class="main-title">COMPUTER DEPARTMENT STUDENTS LIST</h1>
    <p style="font-size: 14px; opacity: 0.9;">Md Asekur Rahman Jubayer | Developer</p>
</header>

<div class="form-container">
    <h2 style="font-size: 18px; margin-bottom: 10px; text-align: center;">Add Student</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="sid" placeholder="Roll">
    <select id="dept">
        <option value="Computer">Computer</option>
        <option value="Civil">Civil</option>
        <option value="Electrical">Electrical</option>
    </select>
    <input type="file" id="imageInput" accept="image/*">
    <button class="btn-add" onclick="addStudent()">Add to List</button>
</div>

<div class="container" id="studentList">
    <script>
        const names = ["Asekur Rahman", "Afrin Sultana", "Sabbir Hossain", "Tania Akter", "Rakib Hasan", "Sumaiya Islam", "Fahim Ahmed", "Nitu Moni"];
        const list = document.getElementById('studentList');
        for(let i=0; i<8; i++) {
            list.innerHTML += `
                <div class="card">
                    <div class="img-box"><img src="https://via.placeholder.com/100" alt="Student"></div>
                    <span class="dept-tag">Computer</span>
                    <h3>${names[i]}</h3>
                    <div class="info"><b>Roll:</b> 65432${i+1}<br><b>Status:</b> Regular Student</div>
                </div>
            `;
        }
    </script>
</div>

<script>
    // Slider (3 Sec)
    let pos = 0;
    const homeSlider = document.getElementById('homeSlider');
    function slideHome() {
        pos++;
        if(pos > 4) pos = 0;
        homeSlider.style.transform = `translateX(-${pos * 20}%)`;
    }
    setInterval(slideHome, 3000);

    // Add Student
    function addStudent() {
        const name = document.getElementById('name').value;
        const sid = document.getElementById('sid').value;
        const dept = document.getElementById('dept').value;
        const imgInput = document.getElementById('imageInput');
        if(!name || !sid || !imgInput.files[0]) { alert("Please fill all!"); return; }

        const reader = new FileReader();
        reader.onload = function(e) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="img-box"><img src="${e.target.result}" alt="Student"></div>
                <span class="dept-tag">${dept}</span>
                <h3>${name}</h3>
                <div class="info"><b>Roll:</b> ${sid}<br><b>Status:</b> Verified</div>
            `;
            document.getElementById('studentList').prepend(card);
        };
        reader.readAsDataURL(imgInput.files[0]);
    }
</script>

</body>
</html>
