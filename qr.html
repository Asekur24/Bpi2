<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced QR Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        /* Colorful Moving Background */
        body { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navbar */
        nav { background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px); padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #f9d423; }

        /* Main Container */
        .qr-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .qr-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
            color: white;
        }

        h2 { margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #f9d423;
            color: #333;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active { transform: scale(0.95); }

        /* QR Code Result Box */
        #qrcode-box {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: none; /* Hidden until generated */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #qr-img { width: 100%; max-width: 200px; }

        .download-btn {
            margin-top: 15px;
            display: block;
            color: #23a6d5;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="qr.html">QR Tool</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="qr-container">
    <div class="qr-card">
        <h2>QR Code Maker</h2>
        <p style="font-size: 13px; margin-bottom: 20px; opacity: 0.8;">Text ba Link likhe QR code toiri koro</p>
        
        <input type="text" id="qr-input" placeholder="Type text or paste URL here...">
        <button onclick="generateQR()">Generate Now</button>

        <div id="qrcode-box">
            <img id="qr-img" src="" alt="QR Code">
            <p style="color: #333; margin-top: 10px; font-size: 12px;">Scan the code below</p>
            <a id="download-link" href="#" download="my_qr.png" class="download-btn">Download Image</a>
        </div>
    </div>
</div>

<script>
    function generateQR() {
        const input = document.getElementById('qr-input').value;
        const box = document.getElementById('qrcode-box');
        const img = document.getElementById('qr-img');
        const downloadLink = document.getElementById('download-link');

        if (input.trim() === "") {
            alert("Please enter some text or a link!");
            return;
        }

        // Real-time API to generate QR
        const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(input);
        
        img.src = qrUrl;
        box.style.display = "block";
        
        // For download (optional enhancement)
        downloadLink.href = qrUrl;
    }
</script>

</body>
</html>
